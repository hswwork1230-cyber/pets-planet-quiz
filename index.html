    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #0f172a; /* Slate 900 */
            color: #f8fafc; /* Slate 50 */
            overflow-x: hidden;
        }

        /* 順暢的 CSS 動畫 */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes float1 {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-12px) rotate(2deg); }
        }
        @keyframes float2 {
            0%, 100% { transform: translateY(0) rotate(2deg); }
            50% { transform: translateY(-10px) rotate(-2deg); }
        }
        @keyframes pulse-slow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .animate-fade-in-up { animation: fadeInUp 0.6s ease-out forwards; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .animate-float-1 { animation: float1 4s ease-in-out infinite; }
        .animate-float-2 { animation: float2 3.5s ease-in-out infinite; }
        .animate-pulse-slow { animation: pulse-slow 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        .animate-spin-slow { animation: spin-slow 4s linear infinite; }

        .hidden-view { display: none !important; }
        
        /* 產品卡片懸停效果 */
        .product-card {
            transition: all 0.3s ease;
        }
        .product-card:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }
        
        /* 隱藏滾動條但保持可以滾動 */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a; 
        }
        ::-webkit-scrollbar-thumb {
            background: #334155; 
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569; 
        }
    </style>
</head>

                    { letter: 'C', text: "懶洋洋地趴在冰涼的地板上，或飯碗旁邊。", type: 'C' },
                    { letter: 'D', text: "躲在紙箱裡、床底，或緊緊貼著你。", type: 'D' }
                ]

            {
                question: "如果毛孩會說話，你覺得他最常對你說的一句話是？",
                options: [
                    { letter: 'A', text: "「快點！我們去玩！丟球球！衝啊！」", type: 'A' },
                    { letter: 'B', text: "「我很美吧？還不快來伺候本喵/本大爺？」", type: 'B' },

        ];

        // 【已修改為本地端路徑】 測驗結果與產品綁定資料
        const resultsData = {

                mascot: IMG_LOOKA,

                mascotQuote: "哼，算你有眼光。本喵的絕世美貌可是需要好好保養的。",

                products: [

                mascotQuote: "嗚汪... 有時候會有點怕怕的，需要主人的抱抱和放鬆補給！",
                colorClass: "from-blue-400 to-indigo-600",
                btnClass: "bg-gradient-to-r from-blue-500 to-indigo-500",
                products: [
                    { name: "《水星》情緒紓緩保健粉", tag: "滿滿安全感", link: "https://www.pets-planet.com.tw/product/detail/1632775", imgUrl: "images/水星.png" },
                    { name: "《海王星》腎臟泌尿保健粉", tag: "順暢無憂", link: "https://www.pets-planet.com.tw/product/detail/1720531", imgUrl: "images/海王星.png" }
                ]

        };

        // 狀態變數
        let currentQ = 0;
        let scores = { A: 0, B: 0, C: 0, D: 0 };

        // DOM 元素快取
        const viewIntro = document.getElementById('view-intro');
        const viewQuiz = document.getElementById('view-quiz');
        const viewLoading = document.getElementById('view-loading');
        const viewResult = document.getElementById('view-result');

        // 切換畫面工具函數
        function showView(viewEl) {
            [viewIntro, viewQuiz, viewLoading, viewResult].forEach(el => el.classList.add('hidden-view'));
            viewEl.classList.remove('hidden-view');
            // 重新觸發淡入動畫
            viewEl.classList.remove('animate-fade-in');
            void viewEl.offsetWidth; 
            viewEl.classList.add('animate-fade-in');
        }

        // 1. 點擊開始
        function startQuiz() {
            showView(viewQuiz);
            renderQuestion();
        }

        // 2. 渲染當前題目
        function renderQuestion() {
            const q = questions[currentQ];
            document.getElementById('question-text').innerText = q.question;
            
            // 更新進度條
            const progressPercent = (currentQ / questions.length) * 100;
            document.getElementById('progress-text').innerText = `問題 ${currentQ + 1} / ${questions.length}`;
            document.getElementById('progress-bar').style.width = `${progressPercent}%`;
            document.getElementById('progress-icon').style.left = `calc(${progressPercent}% - 12px)`;

            // 產生選項
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "text-left w-full p-4 md:p-5 rounded-2xl border border-slate-600 bg-slate-700/40 hover:bg-slate-600/80 hover:border-yellow-400 focus:outline-none focus:ring-2 focus:ring-yellow-400 transition-all duration-200 group flex items-start gap-4";
                btn.onclick = () => handleAnswer(opt.type);
                btn.innerHTML = `
                    <span class="flex-shrink-0 w-8 h-8 md:w-10 md:h-10 rounded-full bg-slate-900 border border-slate-500 text-slate-300 flex items-center justify-center font-bold text-sm md:text-base group-hover:bg-yellow-400 group-hover:text-slate-900 group-hover:border-yellow-400 transition-colors shadow-inner">
                        ${opt.letter}
                    </span>
                    <span class="text-base md:text-lg text-slate-200 group-hover:text-white pt-1 md:pt-1.5 font-medium leading-snug">
                        ${opt.text}
                    </span>
                `;
                optionsContainer.appendChild(btn);
            });
        }

        // 3. 處理作答邏輯
        function handleAnswer(type) {
            scores[type]++;
            if (currentQ < questions.length - 1) {
                currentQ++;
                renderQuestion();
            } else {
                calculateResult();
            }
        }

        // 4. 計算結果與過場
        function calculateResult() {
            showView(viewLoading);

            // 找出最高分，若平手則預設優先順序 A > B > C > D
            let highestType = 'A';
            let max = -1;
            for (const [type, score] of Object.entries(scores)) {
                if (score > max) { 
                    max = score; 
                    highestType = type; 
                }
            }

            // 模擬運算延遲
            setTimeout(() => {
                renderResult(highestType);
            }, 2500);
        }

        // 5. 顯示最終結果與產品圖連結
        function renderResult(type) {
            const data = resultsData[type];
            
            // 更新邊框漸層色
            const border = document.getElementById('result-gradient-border');
            border.className = `p-[2px] md:p-[3px] rounded-3xl bg-gradient-to-br ${data.colorClass} mb-6 mt-4 w-full`;
            
            // 更新文字
            document.getElementById('result-planet').innerText = data.planet;
            document.getElementById('result-title').innerText = data.title;
            document.getElementById('result-desc').innerText = data.desc;
            
            // 更新吉祥物圖片與對話
            const mascotImg = document.getElementById('result-mascot-img');
            mascotImg.src = data.mascot;
            
            document.getElementById('result-quote').innerHTML = `${data.mascotName} 說：<br/><span class="font-normal">「${data.mascotQuote}」</span>`;

            // 動態生成帶有「產品圖」和超連結的卡片按鈕
            const prodContainer = document.getElementById('result-products');
            prodContainer.innerHTML = '';
            data.products.forEach((prod) => {
                // 文字顏色根據按鈕背景調整（金星背景較亮，使用深色字）
                const textColor = type === 'B' ? 'text-slate-900' : 'text-white';
                const tagBorder = type === 'B' ? 'border-slate-800/50' : 'border-white/50';
                
                prodContainer.innerHTML += `
                    <a href="${prod.link}" target="_blank" rel="noopener noreferrer" 
                       class="product-card flex items-center justify-between p-3 md:p-4 rounded-xl ${data.btnClass} shadow-lg w-full group overflow-hidden">
                        
                        <div class="flex items-center gap-3 md:gap-5 flex-1 min-w-0">
                            <!-- 產品圖片 -->
                            <div class="flex-shrink-0 w-14 h-14 md:w-20 md:h-20 bg-white/90 backdrop-blur-sm rounded-lg shadow-inner border border-white/50 flex items-center justify-center p-1 md:p-1.5 transition-transform group-hover:scale-105">
                                <img src="${prod.imgUrl}" alt="${prod.name}" class="w-full h-full object-contain drop-shadow-md" />
                            </div>
                            
                            <!-- 產品資訊 -->
                            <div class="text-left flex-1 min-w-0 py-1">
                                <span class="text-[10px] md:text-xs font-bold border ${tagBorder} rounded-full px-2 py-0.5 mb-1.5 inline-block ${textColor} bg-white/10">
                                    ${prod.tag}
                                </span>
                                <p class="font-extrabold text-sm md:text-base leading-snug ${textColor} truncate whitespace-normal line-clamp-2">${prod.name}</p>
                            </div>
                        </div>
                        
                        <!-- 右側導購箭頭 -->
                        <div class="flex-shrink-0 bg-white/20 rounded-full p-2 group-hover:bg-white/40 transition-colors ml-2 md:ml-4 ${textColor} shadow-sm">
                            <svg class="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"></path></svg>
                        </div>
                    </a>
                `;
            });

            // 確保每次顯示結果頁時都在畫面最上方
            window.scrollTo({ top: 0, behavior: 'smooth' });
            showView(viewResult);
        }

        // 6. 重置測驗
        function resetQuiz() {
            currentQ = 0;
            scores = { A: 0, B: 0, C: 0, D: 0 };
            document.getElementById('progress-bar').style.width = '0%';
            document.getElementById('progress-icon').style.left = 'calc(0% - 12px)';
            window.scrollTo({ top: 0, behavior: 'smooth' });
            showView(viewIntro);
        }
    </script>
</body>
</html>
